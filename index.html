<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>satido</title>

  <meta name="viewport" content="width=device-width">
  <meta http-equiv="X-UA-Compatible" content="chrome=1">

  <link rel="stylesheet" href="styles/timer.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Sharp:opsz,wght,FILL,GRAD@48,400,1,0">
  <link rel="icon" type="image/png" href="favicon.png"> 
  <script src="scripts/theme.js"></script>

  <!-- Primary meta tags -->
  <meta name="title" content="satido's page">
  <meta name="description" content="Minimalistic webpage for my work.">
</head>

<body>
  <!-- logo -->
  <p>
    <img src="assets/img/logo.png">
  </p>

  <!-- countdown timer element -->
  <p id="saticountdown"></p>

  <script>
  // Set the date
  var countDownDate = new Date("Jun 25, 2025 12:00:00").getTime();

  // Update every 1 second
  var x = setInterval(function() {

    // Get today's date
    var now = new Date().getTime();

    // Find the distance between
    var distance = countDownDate - now;

    // Time calculations
    var days = Math.floor(distance / (1000 * 60 * 60 * 24));
    var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    var seconds = Math.floor((distance % (1000 * 60)) / 1000);

    // Display the result
    document.getElementById("saticountdown").innerHTML = days + "d " + hours + "h "
    + minutes + "m " + seconds + "s ";

    // If the count down is finished, write some text
    if (distance < 0) {
      clearInterval(x);
      document.getElementById("saticountdown").innerHTML = "FINISHED...";
    }
  }, 1000);
  </script>
</body>
